<!DOCTYPE html>
<html lang="kmr" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Pro-Down | Admin Key Generator Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;900&display=swap');
        * { font-family: 'Noto Kufi Arabic', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-white p-6">
    <div class="max-w-4xl mx-auto space-y-6">
        <div class="p-6 bg-slate-900 rounded-3xl border border-white/10 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black">Pro-Down Control Panel</h1>
                <p class="text-xs text-slate-400">ڕێڤەبەر: Zaniyar Al-Mzuri</p>
            </div>
            <span class="bg-pink-500/20 text-pink-400 px-3 py-1.5 rounded-xl text-xs font-bold">Admin Active</span>
        </div>

        <div class="grid grid-cols-3 gap-4">
            <div class="p-4 bg-slate-900 rounded-2xl border-l-4 border-pink-500">
                <span class="text-xs text-slate-400">گشتی بەکارهێنەران</span>
                <div class="text-2xl font-black mt-1">1,842</div>
            </div>
            <div class="p-4 bg-slate-900 rounded-2xl border-l-4 border-purple-500">
                <span class="text-xs text-slate-400">کلیلێن چالاککراو</span>
                <div class="text-2xl font-black mt-1" id="keyCount">0</div>
            </div>
            <div class="p-4 bg-slate-900 rounded-2xl border-l-4 border-emerald-500">
                <span class="text-xs text-slate-400">داهات</span>
                <div class="text-2xl font-black text-emerald-400 mt-1">$6,200</div>
            </div>
        </div>

        <div class="p-6 bg-slate-900 rounded-3xl space-y-4">
            <h2 class="font-bold text-sm">دروستکرنا کلیلا نوی (Generate VIP Key)</h2>
            <div class="grid grid-cols-2 gap-4">
                <select id="pkgType" class="bg-slate-950 border border-white/10 p-3 rounded-xl text-xs">
                    <option value="PLUS">Plus 2K (60fps)</option>
                    <option value="PREMIUM">Premium 8K (120fps + Dolby Vision)</option>
                </select>
                <select id="pkgDuration" class="bg-slate-950 border border-white/10 p-3 rounded-xl text-xs">
                    <option value="30">هەیڤانە (30 ڕۆژ)</option>
                    <option value="365">ساڵانە (365 ڕۆژ)</option>
                </select>
            </div>
            <button onclick="generateKey()" class="w-full bg-pink-600 hover:bg-pink-700 font-bold py-3 rounded-xl text-xs">Generate VIP Key</button>
        </div>

        <div class="p-6 bg-slate-900 rounded-3xl">
            <h2 class="font-bold text-sm mb-3">لیستا کلیلێن دروستبووی</h2>
            <div id="keysTable" class="space-y-2 text-xs font-mono"></div>
        </div>
    </div>

    <script>
        function generateKey() {
            const pkg = document.getElementById('pkgType').value;
            const dur = document.getElementById('pkgDuration').value;
            const code = 'PRO-' + pkg + '-' + Math.floor(1000 + Math.random() * 9000) + '-' + Math.random().toString(36).substring(2,6).toUpperCase();
            
            const table = document.getElementById('keysTable');
            table.innerHTML = `<div class="p-3 bg-slate-950 rounded-xl flex justify-between items-center border border-pink-500/30">
                <span class="text-pink-400 font-bold">${code}</span>
                <span class="text-slate-400">${pkg} (${dur} Days)</span>
                <button onclick="navigator.clipboard.writeText('${code}')" class="bg-slate-800 px-3 py-1 rounded">Copy Key</button>
            </div>` + table.innerHTML;
        }
    </script>
</body>
</html>
